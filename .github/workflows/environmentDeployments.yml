name: Environment Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select the environment to deploy"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        run: echo "Code cloned from github"

  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Build Docker Image
        run: echo "Docker image built"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run Tests
        run: echo "All tests passed"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.environment == 'prod'   # ✅ Only runs when prod is selected
    steps:
      - name: Deploy to Production
        run: echo "Deploying to PRODUCTION server"
